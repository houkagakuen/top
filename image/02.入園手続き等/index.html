  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      background-color: #f7f7f7;
    }
    h1 {
      color: #333;
      margin: 20px 0;
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 20px;
      max-width: 1000px;
      width: 90%;
      margin: 20px auto;
    }
    .image-card {
      border: 1px solid #ddd;
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      transition: transform 0.2s;
    }
    .image-card:hover {
      transform: scale(1.02);
    }
    .image-card img {
      width: 100%;
      height: auto;
      display: block;
    }
    .download-links {
      padding: 10px;
      text-align: center;
      background-color: #fff;
    }
    .download-links a {
      display: inline-block;
      margin: 5px;
      padding: 8px 12px;
      color: #fff;
      background-color: #4CAF50;
      text-decoration: none;
      border-radius: 5px;
    }
    .download-links a:hover {
      background-color: #45a049;
    }
    .bulk-download {
      margin: 20px 0;
    }
    .bulk-download a {
      padding: 10px 20px;
      font-size: 16px;
      color: #fff;
      background-color: #007BFF;
      text-decoration: none;
      border-radius: 5px;
    }
    .bulk-download a:hover {
      background-color: #0056b3;
    }
  </style>
</head>
