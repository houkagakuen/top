<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>蜂窩学園 職員サイト</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body, html {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background-color: #f7f7f7;
    }
    .header {
      width: 100%;
      padding: 15px;
      background-color: #4CAF50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: white;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }
    .header .site-title {
      font-size: 24px;
      font-weight: bold;
    }
    .header .search-container {
      display: flex;
      align-items: center;
    }
    .header input[type="text"] {
      padding: 8px;
      font-size: 16px;
      border: none;
      border-radius: 5px;
      margin-right: 10px;
      width: 200px;
    }
    .header button {
      padding: 8px 16px;
      font-size: 16px;
      background-color: #ffffff;
      border: none;
      color: #4CAF50;
      border-radius: 5px;
      cursor: pointer;
    }
    .header button:hover {
      background-color: #e0e0e0;
    }
    .nav {
      display: flex;
      gap: 20px;
    }
    .nav a {
      color: white;
      text-decoration: none;
      font-size: 16px;
    }
    .nav a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <!-- ヘッダー -->
  <header class="header">
    <div class="site-title">蜂窩学園 職員サイト</div>
    <nav class="nav">
      <a href="#">ホーム</a>
      <a href="#">お知らせ</a>
      <a href="#">ドキュメント</a>
      <a href="#">サポート</a>
    </nav>
    <div class="search-container">
      <input type="text" placeholder="サイト内検索">
      <button>検索</button>
    </div>
  </header>

</body>
</html>
